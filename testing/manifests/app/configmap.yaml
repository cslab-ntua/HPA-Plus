apiVersion: v1
kind: ConfigMap
metadata:
  name: test-app-server
data:
  server.py: |
    import http.server
    import json
    import os
    import random
    import socketserver
    import time

    MIN_ITERATIONS = int(os.environ.get("MIN_ITERATIONS", "200000"))
    MAX_ITERATIONS = int(os.environ.get("MAX_ITERATIONS", "600000"))
    MAX_SLEEP_SECONDS = float(os.environ.get("MAX_SLEEP_SECONDS", "0.1"))
    PORT = int(os.environ.get("PORT", "8080"))


    def cpu_bound_loop(iterations: int) -> float:
        """Run a CPU intensive loop to simulate application work."""
        accumulator = 0.0
        limit = 1_000_003
        for i in range(iterations):
            accumulator = (accumulator * 3 + (i % 7)) % limit
        return accumulator


    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            start = time.time()
            iterations = random.randint(MIN_ITERATIONS, MAX_ITERATIONS)
            cpu_bound_loop(iterations)
            if MAX_SLEEP_SECONDS > 0:
                time.sleep(random.random() * MAX_SLEEP_SECONDS)
            duration = time.time() - start
            payload = {
                "path": self.path,
                "iterations": iterations,
                "durationSeconds": duration,
            }
            body = json.dumps(payload).encode("utf-8")
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, format, *args):
            # Suppress default access logging to keep stdout clean.
            return


    class ThreadedHTTPServer(socketserver.ThreadingMixIn, http.server.HTTPServer):
        daemon_threads = True


    if __name__ == "__main__":
        server = ThreadedHTTPServer(("", PORT), Handler)
        print(f"Starting CPU intensive test server on port {PORT}", flush=True)
        try:
            server.serve_forever()
        except KeyboardInterrupt:
            pass
        finally:
            server.server_close()
